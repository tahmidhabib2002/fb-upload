<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FB Bulk Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07090f;
      --bg2:      #0d1117;
      --bg3:      #131922;
      --border:   rgba(255,255,255,0.07);
      --border-md:rgba(255,255,255,0.11);
      --text:     #e2e8f0;
      --text-dim: #8da3be;
      --text-muted:#5a7092;
      --accent:   #06b6d4;
      --green:    #10b981;
      --red:      #ef4444;
      --blue:     #3b82f6;
      --font-ui:  'Plus Jakarta Sans', sans-serif;
      --font-mono:'DM Mono', monospace;
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(6,182,212,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(6,182,212,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 64px rgba(0,0,0,0.5),
        0 0 48px rgba(6,182,212,0.05);
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(59,130,246,0.15));
      border: 1px solid rgba(6,182,212,0.3);
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 20px rgba(6,182,212,0.12);
    }

    .logo svg { display: block; }

    .login-header h1 {
      font-size: 26px;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 13.5px;
      font-weight: 400;
    }

    .login-content {
      margin-bottom: 28px;
    }

    /* Info box */
    .info-box {
      background: rgba(6,182,212,0.07);
      border: 1px solid rgba(6,182,212,0.2);
      border-radius: 10px;
      padding: 13px 16px;
      color: #7dd3e8;
      font-size: 12.5px;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .info-box strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Error box */
    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px;
      padding: 13px 16px;
      margin-bottom: 18px;
      color: #fca5a5;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }
    .error-box.show { display: block; }

    /* Divider label */
    .auth-method-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Google button */
    .btn-google {
      width: 100%;
      padding: 13px 18px;
      background: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      transition: all 0.2s ease;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      letter-spacing: -0.01em;
    }

    .btn-google:hover {
      background: #f0f9ff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .btn-google:active { transform: translateY(0); }

    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      gap: 12px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 16px;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
    }
    .loading.show { display: block; }

    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(6,182,212,0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer-text {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      line-height: 1.6;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-text a:hover { text-decoration: underline; text-underline-offset: 2px; }

    /* Brand tag */
    .brand-tag {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-bottom: 10px;
    }
    .brand-tag-text {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .brand-tag-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
    }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
      .login-header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-tag">
        <span class="brand-tag-text">FB Scheduler</span>
        <span class="brand-tag-dot"></span>
        <span class="brand-tag-text">Viral Clips BD</span>
      </div>
      <h1>স্বাগতম</h1>
      <p>বাল্ক ভিডিও শিডিউলার — অনুমোদিত অ্যাকাউন্টে লগইন করুন</p>
    </div>

    <div class="login-content">

      <div class="info-box">
        <strong>নিরাপদ প্রবেশ</strong>
        শুধুমাত্র অনুমোদিত Google অ্যাকাউন্ট দিয়ে লগইন করা যাবে।
      </div>

      <div class="error-box" id="errorBox"></div>

      <label class="auth-method-label">Google দিয়ে প্রবেশ করুন</label>
      <a href="/api/auth/google" class="btn-google" id="googleBtn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google দিয়ে লগইন করুন
      </a>

      <div class="divider">
        <div class="divider-line"></div>
        <span>বা</span>
        <div class="divider-line"></div>
      </div>

      <div class="loading" id="loadingState">
        <span class="spinner"></span>
        প্রবেশ করছি...
      </div>

    </div>

    <div class="footer-text">
      কোনো সমস্যা?&nbsp;
      <a href="mailto:support@example.com">সহায়তা যোগাযোগ করুন</a>
    </div>

  </div>
</div>

<script>
  if (window.location.pathname === '/login-failed') {
    const errorBox = document.getElementById('errorBox');
    errorBox.innerHTML = '❌ লগইন ব্যর্থ হয়েছে। অনুমোদিত ইমেইল দিয়ে চেষ্টা করুন।';
    errorBox.classList.add('show');
  }

  document.getElementById('googleBtn').addEventListener('click', function() {
    document.getElementById('loadingState').classList.add('show');
  });
</script>

</body>
</html>
